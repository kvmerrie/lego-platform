<section class="admin-shell">
  <header class="admin-shell__header">
    <div class="admin-shell__masthead">
      <div class="stack">
        <p class="eyebrow">Commerce backoffice</p>
        <h1>{{ productName }} operations</h1>
        <p class="muted">
          Beheer merchants en offer seeds bovenop de bestaande catalogussync.
          Klein, duidelijk en bruikbaar voor dagelijkse commerce-operaties.
        </p>
      </div>

      <button class="theme-toggle" type="button" (click)="toggleTheme()">
        {{ themeToggleLabel }}
      </button>
    </div>

    <nav aria-label="Admin navigatie" class="admin-shell__nav">
      @for (navigationItem of navigationItems; track navigationItem.path) {
      <a
        [routerLink]="navigationItem.path"
        class="admin-shell__nav-link"
        routerLinkActive="is-active"
      >
        {{ navigationItem.label }}
      </a>
      }
    </nav>
  </header>

  <main class="admin-shell__body">
    <ng-content></ng-content>
  </main>
</section>
