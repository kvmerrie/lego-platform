<section class="commerce-admin">
  @if (commerceAdminStore.errorMessage()) {
  <section class="admin-panel admin-panel--danger">
    <strong>Admin API fout</strong>
    <p class="admin-muted">{{ commerceAdminStore.errorMessage() }}</p>
  </section>
  } @if (!commerceAdminStore.hasLoaded() && commerceAdminStore.isLoading()) {
  <section class="admin-panel">
    <p class="admin-muted">Commerce-data laden…</p>
  </section>
  } @else {
  <router-outlet></router-outlet>
  }
</section>
