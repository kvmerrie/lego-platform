name: Post Deploy Public Web Revalidation

on:
  deployment_status:

jobs:
  revalidate-public-web:
    if: ${{ github.event.deployment_status.state == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Revalidate production public web
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment }}
          DEPLOYMENT_STATE: ${{ github.event.deployment_status.state }}
          DEPLOYMENT_TARGET_URL: ${{ github.event.deployment_status.target_url }}
          WEB_BASE_URL: ${{ vars.WEB_BASE_URL }}
          WEB_REVALIDATE_SECRET: ${{ secrets.WEB_REVALIDATE_SECRET }}
        run: node scripts/post-deploy-public-web-revalidate.mjs
