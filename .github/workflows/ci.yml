name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

  mvp-readiness:
    runs-on: ubuntu-latest
    needs: quality
    environment: Production – lego-platform-web-production
    env:
      CI: true
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      REBRICKABLE_API_KEY: ${{ secrets.REBRICKABLE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Config diagnostics
        shell: bash
        run: |
          echo "HAS_SUPABASE_URL=$([[ -n "${NEXT_PUBLIC_SUPABASE_URL}" ]] && echo true || echo false)"
          echo "HAS_REBRICKABLE_API_KEY=$([[ -n "${REBRICKABLE_API_KEY}" ]] && echo true || echo false)"

      - name: API tests
        run: pnpm nx run api:test

      - name: Build web
        run: pnpm nx run web:build

      - name: Build api
        run: pnpm nx run api:build

      - name: Catalog sync drift check
        if: ${{ env.REBRICKABLE_API_KEY != '' }}
        run: pnpm sync:catalog:check

      - name: Catalog sync drift check skipped
        if: ${{ env.REBRICKABLE_API_KEY == '' }}
        run: echo "Skipping pnpm sync:catalog:check because REBRICKABLE_API_KEY is not available in this workflow context."

      - name: Commerce sync drift check
        shell: bash
        env:
          COMMERCE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COMMERCE_SUPABASE_URL: ${{ vars.SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          if [[ -z "${COMMERCE_SUPABASE_URL}" || -z "${COMMERCE_SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "Skipping commerce Supabase check: SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY not configured"
            exit 0
          fi

          SUPABASE_URL="${COMMERCE_SUPABASE_URL}" \
            SUPABASE_SERVICE_ROLE_KEY="${COMMERCE_SUPABASE_SERVICE_ROLE_KEY}" \
            pnpm sync:commerce:check
