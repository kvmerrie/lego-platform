name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

  mvp-readiness:
    runs-on: ubuntu-latest
    needs: quality
    env:
      CI: true
      REBRICKABLE_API_KEY: ${{ secrets.REBRICKABLE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: API tests
        run: pnpm nx run api:test

      - name: Build web
        run: pnpm nx run web:build

      - name: Build api
        run: pnpm nx run api:build

      - name: Catalog sync drift check
        if: ${{ env.REBRICKABLE_API_KEY != '' }}
        run: pnpm sync:catalog:check

      - name: Catalog sync drift check skipped
        if: ${{ env.REBRICKABLE_API_KEY == '' }}
        run: echo "Skipping pnpm sync:catalog:check because REBRICKABLE_API_KEY is not available in this workflow context."

      - name: Commerce sync drift check
        run: pnpm sync:commerce:check
