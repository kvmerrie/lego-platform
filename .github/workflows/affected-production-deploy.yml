name: Production Deploy Router

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        type: choice
        default: production
        options:
          - production
          - staging
      deploy_targets:
        description: 'Optional comma-separated manual targets, for example: web,api'
        required: false
        type: string
      base_ref:
        description: 'Optional base ref/SHA for affected detection'
        required: false
        type: string
      head_ref:
        description: 'Optional head ref/SHA for affected detection'
        required: false
        type: string

jobs:
  route-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' && 'Production – lego-platform-web-staging' || 'Production – lego-platform-web-production' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve deploy mode
        id: deploy_mode
        shell: bash
        env:
          DISPATCH_DEPLOY_TARGETS: ${{ inputs.deploy_targets }}
          DISPATCH_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail

          manual_targets="$(printf '%s' "${DISPATCH_DEPLOY_TARGETS:-}" | xargs)"
          deploy_environment="${DISPATCH_ENVIRONMENT:-production}"

          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
            deploy_environment="production"
          fi

          if [[ -n "${manual_targets}" ]]; then
            manual_override="true"
          else
            manual_override="false"
          fi

          echo "deploy_environment=${deploy_environment}" >> "${GITHUB_OUTPUT}"
          echo "manual_override=${manual_override}" >> "${GITHUB_OUTPUT}"
          echo "manual_targets=${manual_targets}" >> "${GITHUB_OUTPUT}"
          echo "[affected-deploy] deploy_environment=${deploy_environment}"
          echo "[affected-deploy] manual_override=${manual_override}"

      - name: Resolve affected range
        id: range
        if: ${{ steps.deploy_mode.outputs.manual_override != 'true' }}
        shell: bash
        env:
          DISPATCH_BASE_REF: ${{ inputs.base_ref }}
          DISPATCH_HEAD_REF: ${{ inputs.head_ref }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          HEAD_REF="${DISPATCH_HEAD_REF:-HEAD}"
          BASE_REF="${DISPATCH_BASE_REF:-${PUSH_BEFORE_SHA:-}}"

          if [[ -z "${BASE_REF}" || "${BASE_REF}" =~ ^0+$ ]]; then
            BASE_REF="$(git rev-parse "${HEAD_REF}~1")"
          fi

          echo "base_ref=${BASE_REF}" >> "${GITHUB_OUTPUT}"
          echo "head_ref=${HEAD_REF}" >> "${GITHUB_OUTPUT}"
          echo "[affected-deploy] base_ref=${BASE_REF} head_ref=${HEAD_REF}"

      - name: List changed files
        if: ${{ steps.deploy_mode.outputs.manual_override != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only "${{ steps.range.outputs.base_ref }}" "${{ steps.range.outputs.head_ref }}" > changed-files.txt
          echo "[affected-deploy] changed files:"
          cat changed-files.txt

      - name: Detect affected Nx projects
        id: affected
        if: ${{ steps.deploy_mode.outputs.manual_override != 'true' }}
        shell: bash
        run: |
          set +e
          pnpm nx show projects --affected --base="${{ steps.range.outputs.base_ref }}" --head="${{ steps.range.outputs.head_ref }}" > affected-projects.txt
          status="$?"
          set -e

          if [[ "${status}" -ne 0 ]]; then
            echo "uncertain=true" >> "${GITHUB_OUTPUT}"
            : > affected-projects.txt
            echo "[affected-deploy] Nx affected detection failed; falling back to api+web."
          else
            echo "uncertain=false" >> "${GITHUB_OUTPUT}"
            echo "[affected-deploy] affected projects:"
            cat affected-projects.txt
          fi

      - name: Route deployment targets
        id: route
        shell: bash
        env:
          AFFECTED_DETECTION_UNCERTAIN: ${{ steps.affected.outputs.uncertain || 'false' }}
          MANUAL_OVERRIDE: ${{ steps.deploy_mode.outputs.manual_override }}
          MANUAL_TARGETS: ${{ steps.deploy_mode.outputs.manual_targets }}
        run: |
          set -euo pipefail

          if [[ "${MANUAL_OVERRIDE}" == "true" ]]; then
            node scripts/affected-deployment-router.mjs route \
              --manual-targets "${MANUAL_TARGETS}"
          else
            node scripts/affected-deployment-router.mjs route \
              --affected-projects-file affected-projects.txt \
              --changed-files-file changed-files.txt
          fi

      - name: Log selected deploy environment
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.deploy_mode.outputs.deploy_environment }}
          MANUAL_OVERRIDE: ${{ steps.route.outputs.manual_override }}
          DEPLOY_TARGETS: ${{ steps.route.outputs.targets }}
        run: |
          echo "[affected-deploy] deploy_environment=${DEPLOY_ENVIRONMENT}"
          echo "[affected-deploy] manual_override=${MANUAL_OVERRIDE}"
          echo "[affected-deploy] deploy_targets=${DEPLOY_TARGETS}"

      - name: Trigger selected deployments
        env:
          DEPLOY_TARGETS: ${{ steps.route.outputs.targets }}
          WEB_DEPLOY_HOOK_URL: ${{ secrets.WEB_DEPLOY_HOOK_URL }}
          API_DEPLOY_HOOK_URL: ${{ secrets.API_DEPLOY_HOOK_URL }}
        run: node scripts/affected-deployment-router.mjs deploy
